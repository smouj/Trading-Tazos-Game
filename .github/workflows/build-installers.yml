name: Build Desktop Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.7.2)'
        required: true
        default: '0.7.2'

permissions:
  contents: write

jobs:
  # ─── Linux (AppImage + .deb) ──────────────────────────
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync version → electron/package.json
        shell: bash
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Setting electron version to: $VERSION"
          node -e "const p=require('./electron/package.json');p.version='${VERSION}';require('fs').writeFileSync('./electron/package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Install dependencies (npm — electron-builder compat)
        run: npm ci

      - name: Build Linux installers
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
          retention-days: 30

  # ─── Windows (.exe NSIS + portable) ────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync version → electron/package.json
        shell: bash
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Setting electron version to: $VERSION"
          node -e "const p=require('./electron/package.json');p.version='${VERSION}';require('fs').writeFileSync('./electron/package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Install dependencies (npm — electron-builder compat)
        run: npm ci

      - name: Build Windows installers
        run: npx electron-builder --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist-electron/*.exe
          retention-days: 30

  # ─── macOS (.dmg + .zip) ──────────────────────────────
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync version → electron/package.json
        shell: bash
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Setting electron version to: $VERSION"
          node -e "const p=require('./electron/package.json');p.version='${VERSION}';require('fs').writeFileSync('./electron/package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Install dependencies (npm — electron-builder compat)
        run: npm ci

      - name: Build macOS installers
        run: |
          npx electron-builder --mac --publish never || {
            echo "First attempt failed (likely hdiutil race), retrying in 30s..."
            sleep 30
            npx electron-builder --mac --publish never
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
          retention-days: 30

  # ─── GitHub Release ────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-electron

      - name: Display structure
        run: find dist-electron -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version && format('v{0}', inputs.version) || github.ref_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
          files: |
            dist-electron/linux-installers/*
            dist-electron/windows-installers/*
            dist-electron/mac-installers/*
