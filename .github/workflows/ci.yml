name: TTG CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/ci.db
      JWT_SECRET: ttg-ci-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run canon:guard
      - run: npx tsc --noEmit

  test:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 5
    env:
      DATABASE_URL: file:./prisma/ci.db
      JWT_SECRET: ttg-ci-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      # Setup DB for local testing
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Prepare smoke database
        run: |
          npx prisma db push --skip-generate
          node scripts/ci-seed.js
      - name: Start dev server
        run: |
          npm run dev &
          sleep 5
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3000/api/health
      - name: Run API tests
        run: BASE_URL=http://localhost:3000 node tests/api.test.js

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      DATABASE_URL: file:./prisma/ci.db
      JWT_SECRET: ttg-ci-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Prepare build database
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
          node scripts/ci-seed.js
      - run: npm run build
