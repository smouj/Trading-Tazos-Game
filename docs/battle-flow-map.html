<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Tazos Game — Battle Flow Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; }
  .card { width: 100%; max-width: 900px; }
  h1 { font-size: 26px; font-weight: 900; color: #FFCC00; margin-bottom: 4px; letter-spacing: -0.5px; }
  .sub { font-size: 12px; color: #666; margin-bottom: 24px; font-weight: 500; }
  svg { width: 100%; display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>🎯 Trading Tazos — Vertical Slam Battle Flow</h1>
  <p class="sub">Tazo-as-moneda physics. Staked tazos = face-down targets. Launcher = airborne finisher.</p>

<svg viewBox="0 0 880 1480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrB" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFCC00" />
    </marker>
    <marker id="arrW" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888" />
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF004D" />
    </marker>
    <marker id="arrB2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#29ADFF" />
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22C55E" />
    </marker>
    <linearGradient id="bgBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#111" />
    </linearGradient>
    <linearGradient id="phIn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCC00" />
      <stop offset="100%" stop-color="#FF8800" />
    </linearGradient>
    <linearGradient id="phOut" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#29ADFF" />
      <stop offset="100%" stop-color="#FF004D" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Background grid -->
  <rect x="0" y="0" width="880" height="1480" fill="#0a0a0a" />
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5" />
  </pattern>
  <rect x="0" y="0" width="880" height="1480" fill="url(#grid)" />

  <!-- Title block -->
  <rect x="40" y="20" width="800" height="56" rx="8" fill="#FFCC00" />
  <text x="440" y="46" text-anchor="middle" font-size="16" font-weight="900" fill="#0a0a0a">BATTLE FLOW MAP — Vertical Slam Physics Engine</text>
  <text x="440" y="64" text-anchor="middle" font-size="10" font-weight="700" fill="#0a0a0a" opacity="0.6">Tazo-as-moneda: launcher falls from above → flips face-down staked tazos</text>

  <!-- Phase 1: LOBBY -->
  <rect x="40" y="96" width="800" height="86" rx="6" fill="url(#bgBox)" stroke="#333" stroke-width="1" />
  <rect x="40" y="96" width="6" height="86" rx="3" fill="#FFCC00" />
  <text x="64" y="122" font-size="14" font-weight="900" fill="#FFCC00">PHASE 1: LOBBY</text>
  <text x="64" y="142" font-size="11" fill="#999">• Select practice/ranked/friend mode • Pick active deck (or auto-detect) • Best 5 tazos auto-selected • AI difficulty: Novice/Skilled/Master</text>
  <text x="64" y="160" font-size="10" fill="#666">tazo count: 5 from your deck → 5 randomly from opponent pool (DEMO_TAZOS for AI)</text>

  <!-- Arrow 1→2 -->
  <line x1="440" y1="182" x2="440" y2="210" stroke="#FFCC00" stroke-width="2" marker-end="url(#arrB)" />

  <!-- Phase 2: INTRO -->
  <rect x="40" y="212" width="800" height="62" rx="6" fill="url(#bgBox)" stroke="#333" stroke-width="1" />
  <rect x="40" y="212" width="6" height="62" rx="3" fill="#FF8800" />
  <text x="64" y="236" font-size="14" font-weight="900" fill="#FF8800">PHASE 2: INTRO ("GET READY!")</text>
  <text x="64" y="256" font-size="11" fill="#999">2-second countdown overlay. Camera flyover arena. Opponent reveal.</text>

  <!-- Arrow 2→3 -->
  <line x1="440" y1="274" x2="440" y2="302" stroke="#FFCC00" stroke-width="2" marker-end="url(#arrB)" />

  <!-- Phase 3: ROUND START — placing stakes -->
  <rect x="40" y="304" width="800" height="72" rx="6" fill="url(#bgBox)" stroke="#333" stroke-width="1" />
  <rect x="40" y="304" width="6" height="72" rx="3" fill="#FF8800" />
  <text x="64" y="326" font-size="14" font-weight="900" fill="#FF8800">PHASE 3: ROUND START — PLACE STAKES</text>
  <text x="64" y="346" font-size="11" fill="#999">Each player stakes ONE tazo face-down in center circle. Launcher tazo selected from remaining deck (≠ staked).</text>
  <text x="64" y="364" font-size="10" fill="#666">function: placeStakedTazos(playerTazo, oppTazo) → positions [-0.55, 0, 0.08] and [+0.55, 0, -0.08]</text>

  <!-- Arrow 3→4 -->
  <line x1="440" y1="376" x2="440" y2="404" stroke="#FFCC00" stroke-width="2" marker-end="url(#arrB)" />

  <!-- Phase 4: PLAYER AIM — THE BIG ONE -->
  <rect x="40" y="406" width="800" height="130" rx="6" fill="#1a1a1a" stroke="#FFCC00" stroke-width="1.5" />
  <rect x="40" y="406" width="6" height="130" rx="3" fill="#FFCC00" />
  <text x="64" y="428" font-size="15" font-weight="900" fill="#FFCC00">🎯 PHASE 4: PLAYER AIM (auto-moving reticle)</text>
  <text x="64" y="448" font-size="11" fill="#aaa">Reticle auto-sweeps in elliptical orbit: passes near both staked tazos (±0.55 on X axis).</text>
  <text x="64" y="466" font-size="11" fill="#FFCC00">Stats that affect AIM:</text>
  <text x="80" y="482" font-size="10" fill="#777">• CONTROL (0–100): Oscillation SPEED — High control = slow, smooth sweep (0.18 rad/s). Low control = fast, wild (1.2 rad/s).</text>
  <text x="80" y="498" font-size="10" fill="#777">• PRECISION (0–100): Jitter amplitude — High precision = steady (±0.01). Low precision = shaky (±0.18 random wobble).</text>
  <text x="64" y="518" font-size="11" fill="#29ADFF">Player clicks 🎯 LOCK AIM → locks current reticle position → button changes to ✅ CHARGE</text>
  <text x="64" y="534" font-size="10" fill="#666">Movement model: x(t) = 0.65·cos(ωt) + jitter, z(t) = 0.28·sin(ωt) + jitter | ω = 1.2 − control/100 × 1.02</text>

  <!-- Arrow 4→5 -->
  <line x1="440" y1="536" x2="440" y2="564" stroke="#FFCC00" stroke-width="2" marker-end="url(#arrB)" />

  <!-- Phase 5: CHARGE -->
  <rect x="40" y="566" width="800" height="86" rx="6" fill="url(#bgBox)" stroke="#333" stroke-width="1" />
  <rect x="40" y="566" width="6" height="86" rx="3" fill="#FF8800" />
  <text x="64" y="588" font-size="14" font-weight="900" fill="#FF8800">⚡ PHASE 5: CHARGE (vertical force meter)</text>
  <text x="64" y="608" font-size="11" fill="#999">Auto-fill meter (2s from 0→100%). Sweet spot: 60–82% = "PERFECT" (green). Over 82% = overcharge (red).</text>
  <text x="64" y="626" font-size="11" fill="#FFCC00">Player can click RELEASE NOW at ANY charge level → skips TILT, goes direct to SLAM.</text>
  <text x="64" y="644" font-size="10" fill="#666">If meter reaches 100%: AUTO transition to TILT phase. onChargeComplete(1.0) → setPhase("player_tilt")</text>

  <!-- Arrow 5→6 (two paths) -->
  <line x1="440" y1="652" x2="440" y2="680" stroke="#FFCC00" stroke-width="2" marker-end="url(#arrB)" />
  <line x1="260" y1="640" x2="200" y2="600" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrG)" stroke-dasharray="4 3" />
  <text x="100" y="595" font-size="9" font-weight="700" fill="#22C55E">RELEASE NOW → skip TILT</text>

  <!-- Phase 6a: TILT (optional) -->
  <rect x="40" y="682" width="800" height="72" rx="6" fill="url(#bgBox)" stroke="#333" stroke-width="1" />
  <rect x="40" y="682" width="6" height="72" rx="3" fill="#FF8800" />
  <text x="64" y="704" font-size="14" font-weight="900" fill="#FF8800">↗ PHASE 6a: TILT (optional precision adjustment)</text>
  <text x="64" y="724" font-size="11" fill="#999">Drag direction pad → sets tilt angle &amp; intensity. Slider → spin intensity 0–100%. Then click 💥 SLAM!</text>
  <text x="64" y="742" font-size="10" fill="#666">Tilt direction: forward/backward/left/right/flat. Determines edge-hit bonus (1.5× near rim).</text>

  <!-- Arrow 6a→7 -->
  <line x1="440" y1="754" x2="440" y2="782" stroke="#FFCC00" stroke-width="2" marker-end="url(#arrB)" />

  <!-- Phase 7: SLAMMING -->
  <rect x="40" y="784" width="800" height="64" rx="6" fill="url(#bgBox)" stroke="#333" stroke-width="1" />
  <rect x="40" y="784" width="6" height="64" rx="3" fill="#FF004D" />
  <text x="64" y="806" font-size="14" font-weight="900" fill="#FF004D">💥 PHASE 7: SLAMMING (gravity freefall)</text>
  <text x="64" y="826" font-size="11" fill="#999">Airborne tazo falls from charge height. 3D animation: velocity += gravity(22) × dt. Shadow tracking on table.</text>
  <text x="64" y="842" font-size="10" fill="#666">fallTimeMs = √(2×height / 22) × 1000. Impact triggered at 0.75×fallTimeMs (visual overlap with floor contact).</text>

  <!-- Arrow 7→8 -->
  <line x1="440" y1="848" x2="440" y2="876" stroke="#FFCC00" stroke-width="2" marker-end="url(#arrB)" />

  <!-- Phase 8: IMPACT — physics resolves -->
  <rect x="40" y="878" width="800" height="110" rx="6" fill="#1a1a1a" stroke="#29ADFF" stroke-width="1.5" />
  <rect x="40" y="878" width="6" height="110" rx="3" fill="#29ADFF" />
  <text x="64" y="900" font-size="14" font-weight="900" fill="#29ADFF">🧠 PHASE 8: IMPACT — PHYSICS ENGINE (simulateSlam)</text>
  <text x="64" y="920" font-size="11" fill="#999">Deterministic collision: computes force on each staked tazo based on distance from impact point.</text>
  <text x="80" y="940" font-size="10" fill="#FFCC00">Impact force = aimPrecision × verticalForce × timingAccuracy × (1 − dist²/distFalloffCap)</text>
  <text x="80" y="956" font-size="10" fill="#777">Edge bonus: +50% force if impact near rim (dist ≥ 3.8). Double flip bonus: +1 extra point.</text>
  <text x="80" y="972" font-size="10" fill="#22C55E">Own tazo flipped → "secured" (+1 pt) | Rival tazo flipped → "captured" (+2 pts)</text>
  <text x="80" y="986" font-size="10" fill="#666">Outcomes: face_up | wobbling | half_flip | out_of_circle | secured | captured</text>

  <!-- Arrow 8→9 -->
  <line x1="440" y1="988" x2="440" y2="1016" stroke="#FFCC00" stroke-width="2" marker-end="url(#arrB)" />

  <!-- Phase 9: RESOLVE -->
  <rect x="40" y="1018" width="800" height="64" rx="6" fill="url(#bgBox)" stroke="#333" stroke-width="1" />
  <rect x="40" y="1018" width="6" height="64" rx="3" fill="#22C55E" />
  <text x="64" y="1040" font-size="14" font-weight="900" fill="#22C55E">PHASE 9: RESOLVE IMPACT</text>
  <text x="64" y="1060" font-size="11" fill="#999">Score popups (+1/+2 float up). Impact message. Score updated. Impact spark ring + screen shake.</text>
  <text x="64" y="1076" font-size="10" fill="#666">checkMatchEnd() → first to 5 wins. If not: opponent turn → doOpponentSlam()</text>

  <!-- Arrow 9→10a or 9→10b -->
  <line x1="440" y1="1082" x2="440" y2="1110" stroke="#FFCC00" stroke-width="2" marker-end="url(#arrB)" />

  <!-- Split: match continues or ends -->
  <rect x="40" y="1112" width="380" height="72" rx="6" fill="url(#bgBox)" stroke="#333" stroke-width="1" />
  <rect x="40" y="1112" width="6" height="72" rx="3" fill="#29ADFF" />
  <text x="64" y="1134" font-size="14" font-weight="900" fill="#29ADFF">PHASE 10a: OPPONENT TURN (AI)</text>
  <text x="64" y="1154" font-size="11" fill="#999">AI auto-selects launcher (≠ staked tazo). generateAISlam() creates SlamParams. Same flow as player.</text>
  <text x="64" y="1172" font-size="10" fill="#666">AI difficulty affects aimPrecision + verticalForce randomness.</text>

  <rect x="460" y="1112" width="380" height="72" rx="6" fill="url(#bgBox)" stroke="#333" stroke-width="1" />
  <rect x="460" y="1112" width="6" height="72" rx="3" fill="#22C55E" />
  <text x="484" y="1134" font-size="14" font-weight="900" fill="#22C55E">PHASE 10b: MATCH END</text>
  <text x="484" y="1154" font-size="11" fill="#999">Winner determined. POST /api/battle saves result. Credits awarded (+30/win).</text>
  <text x="484" y="1172" font-size="10" fill="#666">Result panel: winner, score, captures, XP. REMATCH or BACK TO LOBBY.</text>

  <!-- Arrow from 10a back to 4 (next round) -->
  <path d="M 230 1184 Q 230 1220 440 1220 Q 650 1220 650 1184" fill="none" stroke="#29ADFF" stroke-width="1.5" marker-end="url(#arrB2)" stroke-dasharray="6 3" />
  <text x="440" y="1240" text-anchor="middle" font-size="10" font-weight="700" fill="#29ADFF">next round: back to AIM (new stakes placed)</text>

  <!-- Stats reference panel -->
  <rect x="40" y="1270" width="800" height="90" rx="6" fill="#111" stroke="#333" stroke-width="0.5" />
  <text x="64" y="1292" font-size="12" font-weight="900" fill="#888">TAZO STATS AFFECTING BATTLE:</text>
  <text x="64" y="1310" font-size="10" fill="#666">
    <tspan font-weight="700" fill="#FFCC00">ATK</tspan>: impact force &nbsp;
    <tspan font-weight="700" fill="#FFCC00">DEF</tspan>: flip resistance &nbsp;
    <tspan font-weight="700" fill="#FFCC00">WT</tspan>: slam momentum &nbsp;
    <tspan font-weight="700" fill="#FFCC00">STAB</tspan>: anti-wobble &nbsp;
    <tspan font-weight="700" fill="#FFCC00">SPIN</tspan>: torque transfer &nbsp;
    <tspan font-weight="700" fill="#29ADFF">CTRL</tspan>: reticle speed &nbsp;
    <tspan font-weight="700" fill="#29ADFF">PREC</tspan>: reticle jitter
  </text>
  <text x="64" y="1330" font-size="10" fill="#666">
    <tspan font-weight="700" fill="#FFCC00">RES</tspan>: ring resilience &nbsp;
    <tspan font-weight="700" fill="#FFCC00">BNC</tspan>: rebound velocity &nbsp;
    <tspan font-weight="700" fill="#555">FINISH</tspan>: 12 types (normal/holo/foil/prismatic…) &nbsp;
    <tspan font-weight="700" fill="#555">RARITY</tspan>: 5 tiers → finish distribution
  </text>
  <text x="64" y="1350" font-size="10" fill="#555">Finish effects: CSS-only holographic sweeps, foil reflections, prismatic color cycles. No GPU overhead.</text>

  <!-- Legend -->
  <rect x="40" y="1380" width="800" height="54" rx="4" fill="#111" stroke="#222" stroke-width="0.5" />
  <text x="64" y="1400" font-size="10" font-weight="700" fill="#888">LEGEND:</text>
  <rect x="140" y="1392" width="10" height="10" rx="2" fill="#FFCC00" />
  <text x="156" y="1402" font-size="9" fill="#777">transition</text>
  <rect x="240" y="1392" width="10" height="10" rx="2" fill="#29ADFF" />
  <text x="256" y="1402" font-size="9" fill="#777">AI/opponent path</text>
  <rect x="360" y="1392" width="10" height="10" rx="2" fill="#22C55E" />
  <text x="376" y="1402" font-size="9" fill="#777">optional shortcut</text>
  <rect x="490" y="1392" width="10" height="10" rx="2" fill="#FF004D" />
  <text x="506" y="1402" font-size="9" fill="#777">physics/critical</text>

  <text x="440" y="1468" text-anchor="middle" font-size="9" font-weight="600" fill="#333">RNG: deterministic LCG (seedRNG). Replayable physics. Camera: orbit (aim) → angled (charge) → cinematic (slam) → impact (dramatic).</text>
</svg>
</div>
</body>
</html>
